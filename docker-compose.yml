version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  app:
    build: .
    container_name: express-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s


volumes:
  mongo-data: